{% extends "base.html" %}
{% block content %}

<a href="javascript:history.back()" class="back-link">← Back</a>

<style>
.number-container {
    text-align: center;
    padding: 40px;
}

.number-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.number-card {
    background: #f9fbff;
    padding: 25px;
    border-radius: 15px;
    width: 120px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.number-value {
    font-size: 50px;
    font-weight: bold;
    color: #2c3e50;
}

.number-word {
    font-size: 18px;
    color: #555;
    margin-top: 5px;
}

.button-style {
    margin-top: 10px;
    padding: 6px 12px;
    background: #6c8cff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>

<div class="number-container">

    <h2>Number Learning</h2>

    <div class="number-grid">

        {% for num, word in numbers %}

        <div class="number-card">
            <div class="number-value">{{ num }}</div>
            <div class="number-word">{{ word }}</div>

            <button class="button-style" onclick="speak('{{ word }}')">
                🔊
            </button>
        </div>

        {% endfor %}

    </div>

    <br>

    {% if next_page is not none %}
        <a href="{{ url_for('numbers', page=next_page) }}">
            <button class="button-style">Next →</button>
        </a>
    {% else %}
        <h3>🎉 Completed!</h3>
        <a href="/dashboard">
            <button class="button-style">Back to Dashboard</button>
        </a>
    {% endif %}

</div>

<script>
function speak(word) {
    let speech = new SpeechSynthesisUtterance(word);
    speech.rate = 0.8;
    window.speechSynthesis.speak(speech);
}
</script>

{% endblock %}
