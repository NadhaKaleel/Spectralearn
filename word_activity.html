{% extends "base.html" %}
{% block content %}

<div style="text-align:center; padding:50px;">

    <h1>Word Activity</h1>
    <p style="color:gray;">Choose the correct word</p>

    <h3>Score: {{ score }}</h3>

    <br>

    <!-- IMAGE -->
    <div style="margin-bottom:30px;">
        <img src="{{ url_for('static', filename='images/' + correct_image) }}"
             style="
                width:260px;
                height:260px;
                object-fit:contain;
                border-radius:15px;
                box-shadow:0 6px 18px rgba(0,0,0,0.2);
             ">
    </div>

    <!-- OPTIONS -->
    <form method="POST" action="/check_word_answer">

        <input type="hidden" name="correct_word" value="{{ correct_word }}">

        <div style="
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        ">

            {% for letter, word, image in options %}
                <button type="submit"
                        name="selected"
                        value="{{ word }}"
                        style="
                            padding:12px 25px;
                            font-size:18px;
                            border:none;
                            border-radius:10px;
                            background:#6c5ce7;
                            color:white;
                            cursor:pointer;
                            min-width:120px;
                        ">
                    {{ word }}
                </button>
            {% endfor %}

        </div>

    </form>

</div>

{% endblock %}
